services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 30

  odoo:
    image: odoo:${ODOO_VERSION:-18.0}
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - ./tests/fixtures/odoo_addons:/mnt/extra-addons:ro
    ports:
      - "${ODOO_PORT:-18069}:8069"
