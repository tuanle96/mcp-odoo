name: MCP Registry

on:
  workflow_dispatch:
  workflow_call:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Sync server.json version with pyproject
        run: |
          VERSION=$(python3 -c "import re, pathlib; print(re.search(r'(?m)^version = \"([^\"]+)\"$', pathlib.Path('pyproject.toml').read_text()).group(1))")
          jq --arg v "$VERSION" '.version = $v | (.packages[] | select(.version != null)).version = $v' server.json > server.json.tmp
          mv server.json.tmp server.json
          cat server.json
      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
      - name: Publish to the official MCP registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
