name: Publish to PyPI

on:
  pull_request:
  push:
    branches:
      - main
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
      - name: Build distribution
        run: python -m build
      - name: Verify distribution version
        run: |
          python -m pip install dist/*.whl
          python - <<'PY'
          from importlib.metadata import version

          package_version = version("odoo-mcp")
          if package_version != "0.1.0":
              raise SystemExit(f"Expected odoo-mcp 0.1.0, got {package_version}")
          print(f"odoo-mcp {package_version}")
          PY
      - name: Check distribution
        run: python -m twine check dist/*
      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  mcp-inspector:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run Odoo 19 MCP Inspector smoke
        run: python scripts/odoo_compose_smoke.py --versions 19.0 --timeout 360 --inspector-smoke

  publish:
    runs-on: ubuntu-latest
    needs:
      - test
      - build
      - mcp-inspector
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install publish tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install twine
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*
